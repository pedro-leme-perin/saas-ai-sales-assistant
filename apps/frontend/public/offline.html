<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — TheIAdvisor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --text: #09090b;
      --text-secondary: #71717a;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: #e4e4e7;
      --radius: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #09090b;
        --surface: #18181b;
        --text: #fafafa;
        --text-secondary: #a1a1aa;
        --accent: #3b82f6;
        --accent-hover: #60a5fa;
        --border: #27272a;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      text-align: center;
      max-width: 440px;
      width: 100%;
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 40px;
      height: 40px;
      stroke: var(--text-secondary);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    p {
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 9999px;
      font-size: 13px;
      font-weight: 500;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      margin-bottom: 24px;
      transition: all 0.3s ease;
    }

    .status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      transition: background 0.3s ease;
    }

    .status.online .dot {
      background: #22c55e;
    }

    .status.online {
      color: #22c55e;
      border-color: #22c55e40;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 28px;
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      background: var(--accent-hover);
    }

    button:active {
      transform: scale(0.97);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    button.loading .spinner { display: inline-block; }
    button.loading .btn-text { display: none; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer {
      margin-top: 48px;
      font-size: 12px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>

    <div class="brand">TheIAdvisor</div>

    <h1>Sem conexao com a internet</h1>

    <p>
      Parece que voce esta offline. Verifique sua conexao e tente novamente.
      A pagina sera atualizada automaticamente quando a conexao retornar.
    </p>

    <div class="status" id="status">
      <span class="dot"></span>
      <span id="status-text">Offline</span>
    </div>

    <br><br>

    <button id="retry-btn" onclick="retryConnection()">
      <span class="spinner"></span>
      <span class="btn-text">Tentar novamente</span>
    </button>

    <div class="footer">
      &copy; 2026 TheIAdvisor. Todos os direitos reservados.
    </div>
  </div>

  <script>
    var statusEl = document.getElementById('status');
    var statusText = document.getElementById('status-text');
    var retryBtn = document.getElementById('retry-btn');

    function updateStatus(online) {
      if (online) {
        statusEl.classList.add('online');
        statusText.textContent = 'Online — recarregando...';
        retryBtn.disabled = true;
        setTimeout(function () {
          window.location.reload();
        }, 800);
      } else {
        statusEl.classList.remove('online');
        statusText.textContent = 'Offline';
        retryBtn.disabled = false;
      }
    }

    function retryConnection() {
      retryBtn.classList.add('loading');
      retryBtn.disabled = true;

      fetch('/', { method: 'HEAD', cache: 'no-store' })
        .then(function () {
          updateStatus(true);
        })
        .catch(function () {
          retryBtn.classList.remove('loading');
          retryBtn.disabled = false;
        });
    }

    // Auto-detect connectivity changes
    window.addEventListener('online', function () {
      updateStatus(true);
    });

    window.addEventListener('offline', function () {
      updateStatus(false);
    });

    // Initial state
    if (navigator.onLine) {
      updateStatus(true);
    }
  </script>
</body>
</html>
