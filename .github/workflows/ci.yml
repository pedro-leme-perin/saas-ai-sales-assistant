name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # ──────────────────────────────────────────────
  # Frontend: lint, type-check, build, E2E
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-enterprise

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend-enterprise/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Check bundle size
        run: |
          TOTAL_SIZE=$(find .next -name "*.js" -type f -exec du -cb {} + 2>/dev/null | tail -1 | cut -f1)
          if [ -z "$TOTAL_SIZE" ] || [ "$TOTAL_SIZE" = "0" ]; then
            echo "Warning: Could not calculate bundle size"
            exit 0
          fi
          MAX_SIZE=5242880  # 5MB
          SIZE_MB=$(echo "scale=2; $TOTAL_SIZE/1048576" | bc)
          echo "Total JS bundle size: ${SIZE_MB}MB"
          if [ "$TOTAL_SIZE" -gt "$MAX_SIZE" ]; then
            echo "::warning::Bundle size (${SIZE_MB}MB) exceeds 5MB threshold"
          else
            echo "::notice::Bundle size check passed (${SIZE_MB}MB < 5MB)"
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend-enterprise/playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Backend: lint, type-check, build, unit tests
  # ──────────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-enterprise

    # PostgreSQL service container for integration tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend-enterprise/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint:check

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Unit tests with coverage
        run: npm test -- --coverage --testPathPattern=test/unit --forceExit --passWithNoTests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/saas_test
          NODE_ENV: test

      - name: Apply migrations for integration tests
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/saas_test

      - name: Integration tests
        run: npm test -- --testPathPattern=test/integration --forceExit --passWithNoTests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/saas_test
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend-enterprise/coverage/
          retention-days: 14

  # ──────────────────────────────────────────────
  # Status check gate (required for branch protection)
  # ──────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.frontend.result }}" == "failure" || "${{ needs.backend.result }}" == "failure" ]]; then
            echo "CI failed"
            exit 1
          fi
          echo "All checks passed"
