name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '22'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Install: shared pnpm install + build shared pkg
  # ──────────────────────────────────────────────
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @saas/shared run build

      - name: Cache pnpm store & node_modules
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            apps/backend/node_modules
            apps/frontend/node_modules
            packages/shared/node_modules
            packages/shared/dist
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  # ──────────────────────────────────────────────
  # Frontend: lint, type-check, build, E2E
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: install
    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            apps/backend/node_modules
            apps/frontend/node_modules
            packages/shared/node_modules
            packages/shared/dist
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Rebuild shared package
        run: pnpm --filter @saas/shared run build
        working-directory: .

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run type-check

      - name: Build
        run: pnpm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Check bundle size (tiered)
        run: |
          # Measure client-side bundle only (.next/static) — server bundles are irrelevant for UX
          CLIENT_SIZE=$(find .next/static -name "*.js" -type f -exec du -cb {} + 2>/dev/null | tail -1 | cut -f1)
          TOTAL_SIZE=$(find .next -name "*.js" -type f -exec du -cb {} + 2>/dev/null | tail -1 | cut -f1)
          if [ -z "$CLIENT_SIZE" ] || [ "$CLIENT_SIZE" = "0" ]; then
            echo "::warning::Could not calculate bundle size — find returned no JS files"
            echo "Bundle size: unknown" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # Tiered thresholds:
          #   ≤ 2MB → green (notice)
          #   2-3MB → yellow (warning, track)
          #   > 3MB → red (error, hard fail — regression guard)
          SOFT_LIMIT=2097152  # 2MB
          HARD_LIMIT=3145728  # 3MB
          CLIENT_MB=$(echo "scale=2; $CLIENT_SIZE/1048576" | bc)
          TOTAL_MB=$(echo "scale=2; $TOTAL_SIZE/1048576" | bc)
          {
            echo "## Frontend Bundle Size"
            echo ""
            echo "| Scope | Size |"
            echo "|---|---:|"
            echo "| Client JS (.next/static) | ${CLIENT_MB}MB |"
            echo "| Total JS (incl. server) | ${TOTAL_MB}MB |"
            echo ""
            echo "_Soft limit: 2MB (warn) · Hard limit: 3MB (fail)._"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Client JS bundle: ${CLIENT_MB}MB | Total (incl. server): ${TOTAL_MB}MB"
          if [ "$CLIENT_SIZE" -gt "$HARD_LIMIT" ]; then
            echo "::error::Client bundle (${CLIENT_MB}MB) exceeds 3MB HARD limit — regression must be addressed"
            exit 1
          elif [ "$CLIENT_SIZE" -gt "$SOFT_LIMIT" ]; then
            echo "::warning::Client bundle (${CLIENT_MB}MB) exceeds 2MB soft limit (hard limit 3MB)"
          else
            echo "::notice::Bundle size check passed — client: ${CLIENT_MB}MB ≤ 2MB (total: ${TOTAL_MB}MB)"
          fi

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm exec playwright test --project=chromium
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Backend: lint, type-check, build, unit tests
  # ──────────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: install
    defaults:
      run:
        working-directory: apps/backend

    # PostgreSQL service container for integration tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            apps/backend/node_modules
            apps/frontend/node_modules
            packages/shared/node_modules
            packages/shared/dist
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Rebuild shared package
        run: pnpm --filter @saas/shared run build
        working-directory: .

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Lint
        run: pnpm run lint:check

      - name: Type check
        run: pnpm run type-check

      - name: Build
        run: pnpm run build

      - name: Unit tests with coverage (threshold-enforced)
        run: pnpm test -- --coverage --testPathPattern=test/unit --forceExit --passWithNoTests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/saas_test
          NODE_ENV: test

      - name: Coverage summary to PR
        if: always()
        run: |
          if [[ -f coverage/coverage-summary.json ]]; then
            node -e "const s=require('./coverage/coverage-summary.json').total; const fs=require('fs'); const md=['## Backend Coverage (unit tests)','','| Metric | Pct | Covered | Total |','|---|---:|---:|---:|',\`| Statements | \${s.statements.pct}% | \${s.statements.covered} | \${s.statements.total} |\`,\`| Branches   | \${s.branches.pct}%   | \${s.branches.covered}   | \${s.branches.total}   |\`,\`| Functions  | \${s.functions.pct}%  | \${s.functions.covered}  | \${s.functions.total}  |\`,\`| Lines      | \${s.lines.pct}%      | \${s.lines.covered}      | \${s.lines.total}      |\`,'','_Threshold floor (S64-B): global 65/55/65/65 / common/{guards,filters,interceptors,resilience}/ 75/65/75/75 (unified post-split revert)._'].join('\n'); fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md+'\n'); console.log(md);"
          else
            echo 'WARN: coverage-summary.json not found' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Apply migrations for integration tests
        run: pnpm exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/saas_test

      - name: Integration tests
        run: pnpm test -- --testPathPattern=test/integration --forceExit --passWithNoTests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/saas_test
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: backend-coverage
          path: apps/backend/coverage/
          retention-days: 14

  # ──────────────────────────────────────────────
  # Status check gate (required for branch protection)
  # ──────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.frontend.result }}" == "failure" || "${{ needs.backend.result }}" == "failure" ]]; then
            echo "CI failed"
            exit 1
          fi
          echo "All checks passed"
