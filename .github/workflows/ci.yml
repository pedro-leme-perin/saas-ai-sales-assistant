name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # ──────────────────────────────────────────────
  # Install: shared pnpm install + build shared pkg
  # ──────────────────────────────────────────────
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @saas/shared run build

      - name: Cache pnpm store & node_modules
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            apps/backend/node_modules
            apps/frontend/node_modules
            packages/shared/node_modules
            packages/shared/dist
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  # ──────────────────────────────────────────────
  # Frontend: lint, type-check, build, E2E
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: install
    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            apps/backend/node_modules
            apps/frontend/node_modules
            packages/shared/node_modules
            packages/shared/dist
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Rebuild shared package
        run: pnpm --filter @saas/shared run build
        working-directory: .

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run type-check

      - name: Build
        run: pnpm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Check bundle size
        run: |
          # Measure client-side bundle only (.next/static) — server bundles are irrelevant for UX
          CLIENT_SIZE=$(find .next/static -name "*.js" -type f -exec du -cb {} + 2>/dev/null | tail -1 | cut -f1)
          TOTAL_SIZE=$(find .next -name "*.js" -type f -exec du -cb {} + 2>/dev/null | tail -1 | cut -f1)
          if [ -z "$CLIENT_SIZE" ] || [ "$CLIENT_SIZE" = "0" ]; then
            echo "Warning: Could not calculate bundle size"
            exit 0
          fi
          MAX_CLIENT=2097152  # 2MB client-side threshold
          CLIENT_MB=$(echo "scale=2; $CLIENT_SIZE/1048576" | bc)
          TOTAL_MB=$(echo "scale=2; $TOTAL_SIZE/1048576" | bc)
          echo "Client JS bundle: ${CLIENT_MB}MB | Total (incl. server): ${TOTAL_MB}MB"
          if [ "$CLIENT_SIZE" -gt "$MAX_CLIENT" ]; then
            echo "::warning::Client bundle (${CLIENT_MB}MB) exceeds 2MB threshold (total: ${TOTAL_MB}MB)"
          else
            echo "::notice::Bundle size check passed — client: ${CLIENT_MB}MB < 2MB (total: ${TOTAL_MB}MB)"
          fi

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm exec playwright test --project=chromium
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Backend: lint, type-check, build, unit tests
  # ──────────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: install
    defaults:
      run:
        working-directory: apps/backend

    # PostgreSQL service container for integration tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            apps/backend/node_modules
            apps/frontend/node_modules
            packages/shared/node_modules
            packages/shared/dist
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Rebuild shared package
        run: pnpm --filter @saas/shared run build
        working-directory: .

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Lint
        run: pnpm run lint:check

      - name: Type check
        run: pnpm run type-check

      - name: Build
        run: pnpm run build

      - name: Unit tests with coverage
        run: pnpm test -- --coverage --testPathPattern=test/unit --forceExit --passWithNoTests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/saas_test
          NODE_ENV: test

      - name: Apply migrations for integration tests
        run: pnpm exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/saas_test

      - name: Integration tests
        run: pnpm test -- --testPathPattern=test/integration --forceExit --passWithNoTests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/saas_test
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: backend-coverage
          path: apps/backend/coverage/
          retention-days: 14

  # ──────────────────────────────────────────────
  # Status check gate (required for branch protection)
  # ──────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.frontend.result }}" == "failure" || "${{ needs.backend.result }}" == "failure" ]]; then
            echo "CI failed"
            exit 1
          fi
          echo "All checks passed"
