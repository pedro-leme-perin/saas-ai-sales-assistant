name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '22'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Install: shared pnpm install + build shared pkg
  # ──────────────────────────────────────────────
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @saas/shared run build

      - name: Cache pnpm store & node_modules
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            apps/backend/node_modules
            apps/frontend/node_modules
            packages/shared/node_modules
            packages/shared/dist
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  # ──────────────────────────────────────────────
  # Frontend: lint, type-check, build, E2E
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: install
    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            apps/backend/node_modules
            apps/frontend/node_modules
            packages/shared/node_modules
            packages/shared/dist
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Rebuild shared package
        run: pnpm --filter @saas/shared run build
        working-directory: .

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run type-check

      - name: Build
        run: pnpm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Check bundle size (tiered)
        run: |
          # Measure client-side bundle only (.next/static) — server bundles are irrelevant for UX
          CLIENT_SIZE=$(find .next/static -name "*.js" -type f -exec du -cb {} + 2>/dev/null | tail -1 | cut -f1)
          TOTAL_SIZE=$(find .next -name "*.js" -type f -exec du -cb {} + 2>/dev/null | tail -1 | cut -f1)
          if [ -z "$CLIENT_SIZE" ] || [ "$CLIENT_SIZE" = "0" ]; then
            echo "::warning::Could not calculate bundle size — find returned no JS files"
            echo "Bundle size: unknown" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # Tiered thresholds:
          #   ≤ 2MB → green (notice)
          #   2-3MB → yellow (warning, track)
          #   > 3MB → red (error, hard fail — regression guard)
          SOFT_LIMIT=2097152  # 2MB
          HARD_LIMIT=3145728  # 3MB
          CLIENT_MB=$(echo "scale=2; $CLIENT_SIZE/1048576" | bc)
          TOTAL_MB=$(echo "scale=2; $TOTAL_SIZE/1048576" | bc)
          {
            echo "## Frontend Bundle Size"
            echo ""
            echo "| Scope | Size |"
            echo "|---|---:|"
            echo "| Client JS (.next/static) | ${CLIENT_MB}MB |"
            echo "| Total JS (incl. server) | ${TOTAL_MB}MB |"
            echo ""
            echo "_Soft limit: 2MB (warn) · Hard limit: 3MB (fail)._"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Client JS bundle: ${CLIENT_MB}MB | Total (incl. server): ${TOTAL_MB}MB"
          if [ "$CLIENT_SIZE" -gt "$HARD_LIMIT" ]; then
            echo "::error::Client bundle (${CLIENT_MB}MB) exceeds 3MB HARD limit — regression must be addressed"
            exit 1
          elif [ "$CLIENT_SIZE" -gt "$SOFT_LIMIT" ]; then
            echo "::warning::Client bundle (${CLIENT_MB}MB) exceeds 2MB soft limit (hard limit 3MB)"
          else
            echo "::notice::Bundle size check passed — client: ${CLIENT_MB}MB ≤ 2MB (total: ${TOTAL_MB}MB)"
          fi

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm exec playwright test --project=chromium
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Backend: lint, type-check, build, unit tests
  # ──────────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: install
    defaults:
      run:
        working-directory: apps/backend

    # PostgreSQL service container for integration tests
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            apps/backend/node_modules
            apps/frontend/node_modules
            packages/shared/node_modules
            packages/shared/dist
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Rebuild shared package
        run: pnpm --filter @saas/shared run build
        working-directory: .

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Lint
        run: pnpm run lint:check

      - name: Type check
        run: pnpm run type-check

      - name: Build
        run: pnpm run build

      - name: Unit tests with coverage (threshold-enforced)
        run: pnpm test -- --coverage --testPathPattern=test/unit --forceExit --passWithNoTests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/saas_test
          NODE_ENV: test

      - name: Coverage summary to PR
        if: always()
        run: |
          if [[ -f coverage/coverage-summary.json ]]; then
            node -e "const s=require('./coverage/coverage-summary.json').total; const fs=require('fs'); const md=['## Backend Coverage (unit tests)','','| Metric | Pct | Covered | Total |','|---|---:|---:|---:|',\`| Statements | \${s.statements.pct}% | \${s.statements.covered} | \${s.statements.total} |\`,\`| Branches   | \${s.branches.pct}%   | \${s.branches.covered}   | \${s.branches.total}   |\`,\`| Functions  | \${s.functions.pct}%  | \${s.functions.covered}  | \${s.functions.total}  |\`,\`| Lines      | \${s.lines.pct}%      | \${s.lines.covered}      | \${s.lines.total}      |\`,'','_Threshold floor (S64-C): global 65/55/60/65 / common/{guards,filters,interceptors,resilience}/ 75/65/75/75 (functions floor relaxed +/-1pct flake)._'].join('\n'); fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md+'\n'); console.log(md);"
          else
            echo 'WARN: coverage-summary.json not found' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Apply migrations for integration tests
        run: pnpm exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/saas_test

      - name: Integration tests
        run: pnpm test -- --testPathPattern=test/integration --forceExit --passWithNoTests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/saas_test
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: backend-coverage
          path: apps/backend/coverage/
          retention-days: 14

  # ──────────────────────────────────────────────
  # Security: dependency vulnerability scan (pnpm audit)
  # Blocks merge on HIGH or CRITICAL in production dependencies (S76 ratchet)
  # ──────────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            apps/backend/node_modules
            apps/frontend/node_modules
            packages/shared/node_modules
            packages/shared/dist
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Audit production dependencies (HIGH strict)
        id: audit_prod
        # S76: Ratchet from CRITICAL-only to HIGH+CRITICAL strict. S75 zeroed
        # all HIGH advisories in production deps (multer ~2.1.1, lodash
        # ^4.18.0, next ~15.5.15, follow-redirects ~1.16.0). With baseline
        # clean, gate is now permanent regression guard against any new
        # HIGH or CRITICAL introduced via dependency updates.
        #
        # Inheritance from S74-2: parses metadata.vulnerabilities via Node
        # (authoritative even if pnpm audit exit code is flaky). S74-2 also
        # removed `continue-on-error: true` — gate blocks merge.
        #
        # CVE history retained:
        #   - CVE-2026-41248 Clerk family (S74 pnpm.overrides)
        #   - CVE-2026-41242 protobufjs (S71 pnpm.overrides)
        #   - CVE-2026-3304/2359/3520 multer DoS (S75-1 ~2.1.1)
        #   - CVE-2026-4800 lodash _.template RCE (S75-2 ^4.18.0)
        #   - GHSA-q4gf-8mx6-v5v3 next RSC DoS (S75-3 ~15.5.15)
        #   - GHSA-r4q5-vmmm-2653 follow-redirects header leak (S75-4 ~1.16.0)
        #
        # S80-A: Advisory allowlist introduced. See `ADVISORY_ALLOWLIST` env
        # below + docs/adr/014-otel-prometheus-cve-2026-44902.md for the full
        # rationale. Each entry MUST have: (a) ADR reference, (b) exposure
        # analysis (call-graph vs dependency-graph), (c) removal trigger.
        env:
          # Advisory IDs allowlisted for HIGH-strict gate. Source of truth: ADRs.
          # Format: comma-separated advisory IDs (pnpm audit advisory.id field).
          # Each ID matched per-finding against advisories[].id.
          #
          #   1117942 — @opentelemetry/sdk-node@0.57.2 / CVE-2026-44902
          #     ADR-014. Vulnerability: Prometheus exporter `URL()` crash on
          #     malformed request → DoS. Backend uses ONLY OTLP HTTP exporters
          #     (push to Axiom), NEVER instantiates PrometheusExporter, NEVER
          #     binds port 9464. Runtime exposure = ZERO (call-graph confirmed
          #     in apps/backend/src/infrastructure/telemetry/instrumentation.ts).
          #     The transitive exporter-prometheus@0.57.2 is overridden to
          #     ~0.217.0 via pnpm.overrides, but the sdk-node@0.57.2 package
          #     itself remains flagged because GitHub Advisory range is
          #     `<0.217.0`. Direct bump to sdk-node@0.217 breaks TypeScript
          #     compile (types from sdk-metrics@2.x + resources@2.x diverge
          #     from 1.x line used by current source). Removal trigger: SDK 2.x
          #     migration (deferred ADR S82+, requires staging game-day).
          ADVISORY_ALLOWLIST: '1117942,1120252,GHSA-q7rr-3cgh-j5r3'
        run: |
          set +e
          pnpm audit --prod --audit-level=high --json > /tmp/audit-high.json 2>/tmp/audit-stderr.log
          AUDIT_EXIT=$?
          set -e
          if [[ ! -s /tmp/audit-high.json ]]; then
            echo "::error::pnpm audit failed to produce JSON output (exit=$AUDIT_EXIT)"
            echo "## Security Audit — Tool Error" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/audit-stderr.log >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          # S80-A: Count HIGH+CRITICAL advisories EXCLUDING those in
          # $ADVISORY_ALLOWLIST. Parser iterates advisories[] (not metadata
          # aggregate counts, which can't be allowlisted). Each advisory has
          # `id`, `severity`, `module_name`. We exit non-zero only if a
          # non-allowlisted HIGH or CRITICAL is present.
          COUNT_JSON=$(node -e "
            try {
              const a = require('/tmp/audit-high.json');
              const allowlist = new Set((process.env.ADVISORY_ALLOWLIST || '').split(',').map(s => s.trim()).filter(Boolean));
              const advisories = a.advisories ? Object.values(a.advisories) : [];
              const blocking = [];
              const allowed = [];
              let highTotal = 0, critTotal = 0;
              for (const adv of advisories) {
                const sev = (adv.severity || '').toLowerCase();
                if (sev !== 'high' && sev !== 'critical') continue;
                if (sev === 'high') highTotal++;
                if (sev === 'critical') critTotal++;
                const id = String(adv.id);
                const ghsa = String(adv.github_advisory_id || '');
                // S82-finalize-restore: match either numeric id OR GHSA slug.
                // Rationale: pnpm audit numeric IDs are NOT stable — pnpm/npm
                // advisory database can reissue/renumber (observed S82->S83
                // sdk-node Prometheus advisory: 1117942 → 1120252, same GHSA).
                // GHSA slugs are stable across the npm advisory history.
                if (allowlist.has(id) || (ghsa && allowlist.has(ghsa))) {
                  allowed.push({ id, severity: sev, module: adv.module_name, title: adv.title });
                } else {
                  blocking.push({ id, severity: sev, module: adv.module_name, title: adv.title });
                }
              }
              console.log(JSON.stringify({
                blockingCount: blocking.length,
                allowedCount: allowed.length,
                highTotal, critTotal,
                blocking, allowed
              }));
            } catch (e) {
              console.error(e.message);
              process.exit(2);
            }
          ")
          PARSE_EXIT=$?
          if [[ "$PARSE_EXIT" -ne 0 ]]; then
            echo "::error::failed to parse pnpm audit JSON output"
            exit 1
          fi
          BLOCKING_COUNT=$(node -e "console.log(JSON.parse(process.argv[1]).blockingCount)" "$COUNT_JSON")
          ALLOWED_COUNT=$(node -e "console.log(JSON.parse(process.argv[1]).allowedCount)" "$COUNT_JSON")
          HIGH_N=$(node -e "console.log(JSON.parse(process.argv[1]).highTotal)" "$COUNT_JSON")
          CRIT_N=$(node -e "console.log(JSON.parse(process.argv[1]).critTotal)" "$COUNT_JSON")
          if [[ "$BLOCKING_COUNT" -eq 0 ]]; then
            echo "::notice::pnpm audit clean (blocking=0; allowed=$ALLOWED_COUNT; high=$HIGH_N crit=$CRIT_N; audit_exit=$AUDIT_EXIT)"
            {
              echo "## Security Audit — Production Dependencies"
              echo ""
              echo "Blocking HIGH/CRITICAL: **$BLOCKING_COUNT** (clean)"
              echo ""
              if [[ "$ALLOWED_COUNT" -gt 0 ]]; then
                echo "### Allowlisted advisories ($ALLOWED_COUNT)"
                echo ""
                echo "These advisories are present but allowlisted per documented ADRs (zero runtime exposure):"
                echo ""
                echo "$COUNT_JSON" | node -e "
                  const j = JSON.parse(require('fs').readFileSync(0, 'utf8'));
                  for (const a of j.allowed) {
                    console.log(\`- **\${a.id}** [\${a.severity.toUpperCase()}] \\\`\${a.module}\\\` — \${a.title}\`);
                  }
                "
                echo ""
              fi
              echo "_pnpm audit exit code: $AUDIT_EXIT — advisory-level allowlist is authoritative._"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo "## Security Audit — Blocking HIGH+CRITICAL Production Vulnerabilities ($BLOCKING_COUNT)"
            echo ""
            echo "### Blocking advisories"
            echo ""
            echo "$COUNT_JSON" | node -e "
              const j = JSON.parse(require('fs').readFileSync(0, 'utf8'));
              for (const a of j.blocking) {
                console.log(\`- **\${a.id}** [\${a.severity.toUpperCase()}] \\\`\${a.module}\\\` — \${a.title}\`);
              }
            "
            echo ""
            if [[ "$ALLOWED_COUNT" -gt 0 ]]; then
              echo "### Allowlisted (not counted toward gate)"
              echo ""
              echo "$COUNT_JSON" | node -e "
                const j = JSON.parse(require('fs').readFileSync(0, 'utf8'));
                for (const a of j.allowed) {
                  console.log(\`- **\${a.id}** [\${a.severity.toUpperCase()}] \\\`\${a.module}\\\` — \${a.title}\`);
                }
              "
              echo ""
            fi
            echo "<details><summary>Raw JSON (truncated)</summary>"
            echo ""
            echo '```json'
            head -c 8000 /tmp/audit-high.json
            echo ''
            echo '```'
            echo ''
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::error::pnpm audit found $BLOCKING_COUNT blocking HIGH/CRITICAL vulnerabilities (allowed=$ALLOWED_COUNT total_high=$HIGH_N total_crit=$CRIT_N) — see job summary"
          exit 1

      - name: Audit all dependencies (moderate+ informational)
        if: always()
        run: |
          set +e
          pnpm audit --audit-level=moderate --json > /tmp/audit-all.json 2>/dev/null
          set -e
          # informational only — never fails build, just reports
          if [[ -s /tmp/audit-all.json ]]; then
            VULN_COUNT=$(node -e "try { const a = require('/tmp/audit-all.json'); const meta = a.metadata && a.metadata.vulnerabilities ? a.metadata.vulnerabilities : {}; const total = Object.values(meta).reduce((s,n) => s + (n||0), 0); console.log(total); } catch(e) { console.log('0'); }")
            {
              echo ""
              echo "### All deps (moderate+ informational)"
              echo ""
              echo "Total vulnerabilities (moderate or higher): $VULN_COUNT"
              echo ""
              echo "_Run \`pnpm audit\` locally to inspect and remediate._"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  # ──────────────────────────────────────────────
  # Status check gate (required for branch protection)
  # ──────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [frontend, backend, security]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.frontend.result }}" == "failure" || "${{ needs.backend.result }}" == "failure" || "${{ needs.security.result }}" == "failure" ]]; then
            echo "CI failed"
            exit 1
          fi
          echo "All checks passed"
